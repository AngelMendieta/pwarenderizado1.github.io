<!DOCTYPE html>
<html lang="es" class="light dark">

<head>

 <meta charset="UTF-8">

 <title>Lista - PWA Renderizado</title>

 <meta name="description" content="PWA del equipo de desarrollo con Material Design 3 Expressive">

 <script type="module" src="js/lib/registraServiceWorker.js"></script>

 <meta name="viewport" content="width=device-width">
 <meta name="theme-color" content="#fffbfe">

 <link rel="icon" sizes="32x32" href="favicon.ico">
 <link rel="manifest" href="site.webmanifest">

 <script src="ungap/custom-elements.js"></script>

 <script type="module" src="js/lib/custom/md-app-bar.js"></script>
 <script type="module" src="js/nav-tab-fixed.js"></script>

<link rel="stylesheet" href="css/theme/light.css">
<link rel="stylesheet" href="css/theme/dark.css">
 <!-- estilos -->
 <link rel="stylesheet" href="css/estilos.css">
 <link rel="stylesheet" href="css/transicion_pestanas.css">
 <link rel="stylesheet" href="css/md-tab.css">
 <link rel="stylesheet" href="css/material-symbols-outlined.css">
 <link rel="stylesheet" href="css/md-list.css">
 <link rel="stylesheet" href="css/theme/light.css">
<link rel="stylesheet" href="css/theme/dark.css">

</head>

<body>

 <md-app-bar class="centered" adicional="tab">
  <h1>Equipo de Desarrollo</h1>
 </md-app-bar>

 <nav-tab-fixed id="tab"></nav-tab-fixed>

 <section>

  <p class="md-body">
   Lista generada desde el cliente usando lista dinámico con PHP.
  </p>

  <ul class="md-list" id="lista">
   <li>Cargando...</li>
  </ul>

  <footer>
   <ul>
    <li>
     <p>
      <small>
       © 2026 Equipo de Desarrollo PWA. Todos los derechos reservados.
      </small>
     </p>
    </li>
   </ul>
  </footer>

 </section>

 <script type="module">

  import { consume } from "./js/lib/consume.js"
  import { recibeJson } from "./js/lib/recibeJson.js"
  import { htmlentities } from "./js/lib/htmlentities.js"

  const lista = document.getElementById("lista")

  descargaDatos()

  async function descargaDatos() {
   try {
    const respuesta = await consume(recibeJson("php/lista.php"))
    const json = await respuesta.json()

    let render = ""

    for (const item of json) {

     const nombre = htmlentities(item.nombre)
     const chiste = htmlentities(item.chiste)

     render += `
      <li class="md-two-line">
       <span class="headline">${nombre}</span>
       <span class="supporting">${chiste}</span>
      </li>
     `
    }

    lista.innerHTML = render

   } catch (error) {
    lista.innerHTML = "<li>Error al cargar datos</li>"
    console.error(error)
   }
  }

 </script>

</body>

</html>
